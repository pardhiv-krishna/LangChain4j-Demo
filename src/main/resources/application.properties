# Spring Boot Application Configuration
spring.application.name=langchain4j-demo

# Server Configuration
server.port=8080

# Google Gemini Configuration
# Get your FREE API key from: https://aistudio.google.com/app/api-keys
# Set in .env file: GEMINI_API_KEY=your-key-here
gemini.api.key=${GEMINI_API_KEY_BACKUP}
gemini.model.name=gemini-2.5-flash

# Logging Configuration
logging.level.root=INFO
logging.level.com.demo.langchain4j=DEBUG
logging.level.dev.langchain4j=DEBUG

# Spring Boot Banner
spring.main.banner-mode=console

# Jackson Configuration (for JSON)
spring.jackson.serialization.indent-output=true

